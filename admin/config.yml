backend:
  name: github
  repo: erikssonaugust03/Stall-Zeb-Jonasson
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "startkommentarer"
    label: "Startkommentarer"
    files:
      - name: "startkommentarer"
        label: "Startkommentarer"
        file: "data/startkommentarer.json"
        fields:
          - label: "Starter"
            name: "starter"
            widget: "list"
            fields:
              - { label: "Datum", name: "datum", widget: "date", format: "YYYY-MM-DD" }
              - { label: "Lopp (t.ex. V64 · Romme)", name: "lopp", widget: "string" }
              - label: "Hästar"
                name: "hastar"
                widget: "list"
                fields:
                  - { label: "Hästnamn", name: "namn", widget: "string" }
                  - { label: "Lopp (t.ex. V64-2)", name: "start", widget: "string" }
                  - { label: "Kommentar", name: "kommentar", widget: "text" }

  - name: "hastar_i_stallet"
    label: "Hästar i stallet"
    files:
      - name: "hastar"
        label: "Hästar i stallet"
        file: "data/hastar.json"
        fields:
          - label: "Hästar"
            name: "hastar"
            widget: "list"
            fields:
              - { label: "Namn", name: "namn", widget: "string" }
              - { label: "Slug (url-namn, t.ex. rusa-tooma)", name: "slug", widget: "string", hint: "Små bokstäver, bindestreck istället för mellanslag" }
              - { label: "Ålder (t.ex. 3 år)", name: "alder", widget: "string" }
              - { label: "Kön", name: "kon", widget: "select", options: ["Valack", "Sto", "Hingst"] }
              - { label: "Far", name: "far", widget: "string" }
              - { label: "Mor", name: "mor", widget: "string" }
              - { label: "Ägare", name: "agare", widget: "string", required: false }
              - { label: "Uppfödare", name: "uppfodare", widget: "string", required: false }
              - { label: "Skötare", name: "skotare", widget: "string", required: false }
              - { label: "Travsport-länk", name: "travsport", widget: "string", required: false }
              - { label: "Bild", name: "bild", widget: "image", required: false }

  - name: "hastar_till_salu"
    label: "Hästar till salu"
    files:
      - name: "hastar_till_salu"
        label: "Hästar till salu"
        file: "data/hastar-till-salu.json"
        fields:
          - label: "Hästar"
            name: "hastar"
            widget: "list"
            fields:
              - { label: "Hästnamn", name: "namn", widget: "string" }
              - { label: "Ålder & kön (t.ex. 2 år · Hingst)", name: "alder_kon", widget: "string" }
              - { label: "Far", name: "far", widget: "string" }
              - { label: "Mor", name: "mor", widget: "string" }
              - { label: "Antal andelar", name: "antal_andelar", widget: "string" }
              - { label: "Typ", name: "typ", widget: "select", options: ["Andel", "Hel häst"] }
              - { label: "Pris (kr)", name: "pris", widget: "string" }
              - { label: "Beskrivning", name: "beskrivning", widget: "text" }
              - { label: "Bild", name: "bild", widget: "image", required: false }
