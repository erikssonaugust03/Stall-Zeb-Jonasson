backend:
  name: github
  repo: erikssonaugust03/Stall-Zeb-Jonasson
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "startkommentarer"
    label: "Startkommentarer"
    files:
      - name: "startkommentarer"
        label: "Startkommentarer"
        file: "data/startkommentarer.json"
        fields:
          - label: "Starter"
            name: "starter"
            widget: "list"
            fields:
              - { label: "Datum", name: "datum", widget: "date", format: "YYYY-MM-DD" }
              - { label: "Lopp (t.ex. V64 · Romme)", name: "lopp", widget: "string" }
              - label: "Hästar"
                name: "hastar"
                widget: "list"
                fields:
                  - { label: "Hästnamn", name: "namn", widget: "string" }
                  - { label: "Lopp (t.ex. V64-2)", name: "start", widget: "string" }
                  - { label: "Kommentar", name: "kommentar", widget: "text" }

  - name: "hastar_till_salu"
    label: "Hästar till salu"
    files:
      - name: "hastar_till_salu"
        label: "Hästar till salu"
        file: "data/hastar-till-salu.json"
        fields:
          - label: "Hästar"
            name: "hastar"
            widget: "list"
            fields:
              - { label: "Hästnamn", name: "namn", widget: "string" }
              - { label: "Ålder & kön", name: "alder_kon", widget: "string" }
              - { label: "Far", name: "far", widget: "string" }
              - { label: "Mor", name: "mor", widget: "string" }
              - { label: "Antal andelar", name: "antal_andelar", widget: "string" }
              - { label: "Typ", name: "typ", widget: "select", options: ["Andel", "Hel häst"] }
              - { label: "Pris (kr)", name: "pris", widget: "string" }
              - { label: "Beskrivning", name: "beskrivning", widget: "text" }
